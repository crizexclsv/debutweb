  <!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>Andrea's 18th Birthday</title>
      <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="intro.css">
      <link rel="stylesheet" href="mobileintro.css">
      <script src="intro.js" defer></script>
  </head>
  <body>
        <h1 id="greetings">Hi,</h1>
        <h2 id="greet">Please open this invitation card for you!</h2>
  <div class="scene">
    <div class="envelope" id="envelope">
      <div class="env-back"></div>
      <div class="letter">
        <div class="message">
        </div>
      </div>
      <div class="env-pocket">
      </div>
      <div class="env-front">
      </div>
      <div class="seal" id="seal">
      </div>
    </div>
    <div class="hint">Click the seal to open</div>
  </div>
   <audio id="backgroundMusic" loop>
        <source src="Taylor Swift - Enchanted (Taylor's Version) (Lyric Video).mp3" type="audio/mpeg">
      </audio>
  </body>
  </html>
