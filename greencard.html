<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Maria Andrea's 18th Birthday</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Libre+Baskerville&display=swap" rel="stylesheet">
<link rel="stylesheet" href="greencard.css" media="screen and (min-width: 1025px)">
<link rel="stylesheet" href="greencard-mobile-base.css" media="screen and (max-width: 1024px)">
<link rel="stylesheet" href="greencard-ios.css" media="screen and (max-width: 1024px)">





    <script>
      (function() {
        if (/Android/i.test(navigator.userAgent)) {
          var link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = 'greencard-android.css';
          document.head.appendChild(link);
        } else if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
          var link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = 'greencard-ios.css';
          document.head.appendChild(link);
        }
      })();
    </script>


</head>
<body>

    <!-- Front page: full photo -->
    <div class="page page-front">
        <div class="front-text">
            <h1 class="front-title">You're invited to<br>18th Shots</h1>
            <p class="front-subtitle">Please find your name here in the list</p>
        </div>
    </div>

    <!-- Back page: guest card -->
    <div class="page page-back">
         </div>
        

    <!-- Background music -->
    <audio id="backgroundMusic" autoplay loop preload="auto" volume="0.5">
        <source src="Taylor Swift - Enchanted (Taylor's Version) (Lyric Video).mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        function playAudio() {
            const audio = document.getElementById("backgroundMusic");
            if (audio) {
                audio.volume = 0.5;
                audio.play().catch(e => console.log('Audio play failed:', e));
            }
        }

        // Try autoplay on multiple events for better reliability
        document.addEventListener('DOMContentLoaded', playAudio);
        window.addEventListener('load', playAudio);
        // Fallback: play on first user interaction
        document.addEventListener('click', playAudio, { once: true });
        document.addEventListener('touchstart', playAudio, { once: true });
    </script>
</body>
</html>
